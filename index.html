<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700,800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-escuro: #050505;
            --verde-primario: #076f28;
            --verde-secundario: #05561f;
            --branco: #FFFFFF;
            --fonte-principal: 'General Sans', sans-serif;
        }

        * { 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale; 
        }

        body { 
            font-family: var(--fonte-principal); 
            margin: 0; 
            background: var(--bg-escuro); 
            color: var(--branco); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 20px;
        }
        
        #status-obs {
            padding: 10px 25px; border-radius: 50px; font-weight: 700; margin-bottom: 15px;
            font-size: 12px; text-transform: uppercase; background: #111; color: #555;
            border: 2px solid rgba(255,255,255,0.05); text-align: center;
        }
        .status-on { background: #b71c1c !important; color: white !important; box-shadow: 0 0 30px #ff0000; animation: flash 1s infinite; border-color: #ff4d4d !important; }

        @keyframes flash { 50% { opacity: 0.6; } }

        .cronometro-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
        }

        #topo-relogio { 
            background: var(--verde-primario); 
            padding: 15px; 
            font-size: clamp(24px, 5vw, 48px); 
            font-weight: 800; 
            border-radius: 20px 20px 0 0; 
            text-align: center; 
        }

        #corpo-cronometro { 
            background: var(--verde-secundario); 
            padding: 40px 20px; 
            border-radius: 0 0 40px 40px; 
            border: 8px solid var(--verde-primario); 
            border-top: none; 
            display: flex; 
            justify-content: center;
        }
        
        #tempo-display { 
            font-size: clamp(80px, 25vw, 280px); 
            font-weight: 800; 
            color: var(--branco); 
            line-height: 0.85; 
            font-variant-numeric: tabular-nums; 
            outline: none; 
            text-align: center;
            width: 100%;
        }
        
        .urgente { color: #ffeb3b !important; } 
        .excedido { color: #ff4d4d !important; }
        .tremendo { animation: shake 0.1s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(4px); } 75% { transform: translateX(-4px); } }

        #controles { 
            margin-top: 25px; 
            background: #121212; 
            padding: 20px; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%;
            max-width: 900px;
            border: 1px solid #222;
        }
        
        .linha-controles {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }

        input { 
            background: #000; border: 2px solid #333; color: #55E21F; 
            padding: 12px; width: 140px; text-align: center; 
            font-size: 22px; font-weight: 700; border-radius: 12px; font-family: var(--fonte-principal);
        }

        button { 
            padding: 14px 18px; border: none; border-radius: 10px; 
            font-weight: 700; cursor: pointer; text-transform: uppercase; 
            font-size: 11px; letter-spacing: 0.5px; background: var(--verde-primario); 
            color: white; border-bottom: 3px solid #044419;
            flex: 1;
            min-width: 120px;
        }
        
        button:active { transform: translateY(1px); border-bottom: none; }
        .btn-pausar { background: #e67e22 !important; border-bottom-color: #a05819 !important; }
        .btn-danger { background: #8b0000 !important; border-bottom-color: #4b0000 !important; }
        .btn-obs { background: #333; border-bottom-color: #111; }

        @media (max-width: 600px) {
            button { min-width: 45%; }
        }
    </style>
</head>
<body>

    <div id="status-obs">Sistema Offline</div>

    <div class="cronometro-container">
        <div id="topo-relogio">00:00:00</div>
        <div id="corpo-cronometro">
            <div id="tempo-display" contenteditable="true" spellcheck="false">05:00</div>
        </div>
    </div>
    
    <div id="controles">
        <div class="linha-controles">
            <input type="text" id="in-t" value="05:00">
            <button onclick="setPre('02:00')">2 Min</button>
            <button onclick="setPre('05:00')">5 Min</button>
            <button onclick="setPre('15:00')">15 Min</button>
        </div>

        <div class="linha-controles">
            <button id="btn-main" onclick="acaoPrincipal()">Iniciar</button>
            <button class="btn-danger" onclick="pararTudo()">Desativar</button>
            <button onclick="resetarTotal()">Resetar</button>
            <button class="btn-obs" id="btn-vis-on" onclick="toggleOBS(true)">Mostrar OBS</button>
            <button class="btn-obs" id="btn-vis-off" onclick="toggleOBS(false)">Ocultar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANkLt3rRd16ueIAKbfFhCXfcutMEky_c8",
            authDomain: "cronometro-82294.firebaseapp.com",
            projectId: "cronometro-82294",
            databaseURL: "https://cronometro-82294-default-rtdb.firebaseio.com",
            appId: "1:716345460408:web:27a5699b42d17f4b58d64d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const disp = document.getElementById('tempo-display');
        const inputTempo = document.getElementById('in-t');
        const btnMain = document.getElementById('btn-main');

        let ticker, totalSegundos = 300, rodando = false, visivel = false;
        let tempoOriginalSegundos = 300;

        // ── Web Audio API – sirene (desktop + mobile) ───────────────────────
        let audioCtx = null;
        let sireneAtiva = false;
        // Referências dos nós ativos para poder parar depois
        let _osc = null, _lfo = null, _gain = null;

        /**
         * Retorna (ou cria) o AudioContext e garante que está rodando.
         * No iOS o contexto nasce "suspended"; .resume() só funciona
         * dentro de um event handler de toque – por isso chamamos
         * forcarAudio() em CADA onclick antes de qualquer lógica.
         */
        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();          // precisa estar num event handler
            }
            return audioCtx;
        }

        /**
         * Sirene de alta intensidade:
         *  - Oscilador sawtooth (rico em harmônicos, penetrante)
         *  - LFO modulando freq entre ~500 Hz e ~1400 Hz (efeito wail)
         *  - DynamicsCompressor no final: maximiza volume percebido no celular
         *    sem distorcer e sem ser cortado pelo limitador do sistema
         */
        function tocarSirene() {
            if (sireneAtiva) return;
            sireneAtiva = true;

            const ctx = getAudioCtx();
            const now = ctx.currentTime;

            // — Oscilador principal —
            _osc = ctx.createOscillator();
            _osc.type = 'sawtooth';
            _osc.frequency.setValueAtTime(950, now);

            // — LFO (1 Hz, ±450 Hz de swing → 500..1400 Hz) —
            _lfo = ctx.createOscillator();
            _lfo.type = 'sine';
            _lfo.frequency.setValueAtTime(1.0, now);
            const lfoGain = ctx.createGain();
            lfoGain.gain.setValueAtTime(450, now);
            _lfo.connect(lfoGain);
            lfoGain.connect(_osc.frequency);

            // — Gain: volume máximo —
            _gain = ctx.createGain();
            _gain.gain.setValueAtTime(1.0, now);

            // — Compressor: soa mais alto no celular sem clipar —
            const comp = ctx.createDynamicsCompressor();
            comp.threshold.setValueAtTime(-6, now);   // dB
            comp.knee.setValueAtTime(3, now);
            comp.ratio.setValueAtTime(20, now);
            comp.attack.setValueAtTime(0, now);
            comp.release.setValueAtTime(0.1, now);

            _osc.connect(_gain);
            _gain.connect(comp);
            comp.connect(ctx.destination);

            _lfo.start(now);
            _osc.start(now);
        }

        function pararSirene() {
            if (!sireneAtiva) return;
            sireneAtiva = false;
            try {
                const now = audioCtx.currentTime;
                // Fade-out de 80 ms para não clicar
                _gain.gain.setTargetAtTime(0, now, 0.03);
                const o = _osc, l = _lfo;
                setTimeout(() => {
                    try { o.stop(); } catch(e) {}
                    try { l.stop(); } catch(e) {}
                }, 250);
            } catch(e) {}
            _osc = null; _lfo = null; _gain = null;
        }

        /**
         * Deve ser chamado DENTRO de cada event handler (onclick).
         * Isso garante que o iOS desbloqueie o AudioContext no primeiro toque.
         */
        function forcarAudio() {
            getAudioCtx();
        }

        // Desbloqueia também em qualquer toque na página (fallback para iOS)
        document.addEventListener('touchstart', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: false, passive: true });

        // ────────────────────────────────────────────────────────────────────

        // ── Persistência local (localStorage) ───────────────────────────────
        const LS_KEY = 'cronometro_estado';

        function salvarLocal() {
            try {
                localStorage.setItem(LS_KEY, JSON.stringify({
                    totalSegundos,
                    tempoOriginalSegundos,
                    rodando,
                    timestamp: Date.now()
                }));
            } catch(e) {}
        }

        function restaurarLocal() {
            try {
                const raw = localStorage.getItem(LS_KEY);
                if (!raw) return false;
                const estado = JSON.parse(raw);

                tempoOriginalSegundos = estado.tempoOriginalSegundos ?? 300;
                let seg = estado.totalSegundos ?? 300;

                // Se estava rodando, desconta o tempo passado enquanto fechado
                if (estado.rodando && estado.timestamp) {
                    const decorrido = Math.floor((Date.now() - estado.timestamp) / 1000);
                    seg -= decorrido;
                }

                totalSegundos = seg;

                const abs = Math.abs(totalSegundos);
                const m = Math.floor(abs / 60), s = abs % 60;
                const texto = `${totalSegundos < 0 ? '-' : ''}${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                disp.innerText = texto;
                inputTempo.value = texto;

                if (totalSegundos < 0) disp.className = 'excedido';
                else if (totalSegundos <= 30) disp.className = 'urgente';
                else disp.className = '';

                return true;
            } catch(e) { return false; }
        }
        // ────────────────────────────────────────────────────────────────────

        function subir() {
            salvarLocal();
            set(ref(db, 'sessao'), { t: disp.innerText, c: disp.className, v: visivel });
        }

        function formatarEntrada(texto) {
            let apenasNumeros = texto.replace(/\D/g, '');
            if (!apenasNumeros) return "00:00";
            let num = parseInt(apenasNumeros);
            let m = Math.floor(num / 100);
            let s = num % 100;
            if (s > 59) s = 59;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function definirNovoTempo(texto) {
            forcarAudio();
            const limpo = formatarEntrada(texto);
            disp.innerText = limpo;
            inputTempo.value = limpo;
            let p = limpo.split(':');
            totalSegundos = (parseInt(p[0]) * 60) + parseInt(p[1]);
            tempoOriginalSegundos = totalSegundos;
            disp.className = '';
            pararSirene();
            subir();
        }

        window.acaoPrincipal = () => {
            forcarAudio();
            if (rodando) {
                clearInterval(ticker);
                rodando = false;
                btnMain.innerText = "Iniciar";
                btnMain.classList.remove('btn-pausar');
                disp.contentEditable = "true";
                disp.classList.remove('tremendo');
                pararSirene();
            } else {
                rodando = true;
                btnMain.innerText = "Pausar";
                btnMain.classList.add('btn-pausar');
                disp.contentEditable = "false";

                ticker = setInterval(() => {
                    totalSegundos--;
                    const abs = Math.abs(totalSegundos);
                    const m = Math.floor(abs / 60), s = abs % 60;
                    const tempoTexto = `${totalSegundos < 0 ? '-' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

                    disp.innerText = tempoTexto;
                    inputTempo.value = tempoTexto;

                    if (totalSegundos < 0) {
                        disp.className = 'excedido';
                        if (totalSegundos >= -10) {
                            // Primeiros 10 segundos além do limite: sirene + tremor
                            disp.classList.add('tremendo');
                            tocarSirene();
                        } else {
                            // Depois de -10 s: para a sirene, mantém cor vermelha
                            disp.classList.remove('tremendo');
                            pararSirene();
                        }
                    } else if (totalSegundos <= 30) {
                        disp.className = 'urgente';
                        pararSirene();
                    } else {
                        disp.className = '';
                        pararSirene();
                    }
                    subir();
                }, 1000);
            }
        };

        window.resetarTotal = () => {
            forcarAudio();
            clearInterval(ticker);
            rodando = false;
            btnMain.innerText = "Iniciar";
            btnMain.classList.remove('btn-pausar');
            disp.contentEditable = "true";
            totalSegundos = tempoOriginalSegundos;
            const abs = Math.abs(totalSegundos);
            const m = Math.floor(abs / 60), s = abs % 60;
            disp.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            inputTempo.value = disp.innerText;
            disp.className = '';
            pararSirene();
            subir();
        };

        window.pararTudo = () => { resetarTotal(); toggleOBS(false); };

        window.toggleOBS = (v) => {
            forcarAudio();
            visivel = v;
            const st = document.getElementById('status-obs');
            st.innerText = v ? "OBS: AO VIVO 🟢" : "OBS: OCULTO 🔴";
            v ? st.classList.add('status-on') : st.classList.remove('status-on');
            subir();
        };

        inputTempo.onblur = () => definirNovoTempo(inputTempo.value);
        disp.onblur = () => definirNovoTempo(disp.innerText);
        disp.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); disp.blur(); } };
        window.setPre = (v) => { definirNovoTempo(v); };

        setInterval(() => {
            document.getElementById('topo-relogio').innerText = new Date().toLocaleTimeString('pt-PT');
        }, 1000);

        // Restaura estado salvo; se não houver, começa em 05:00
        if (!restaurarLocal()) {
            definirNovoTempo("05:00");
        }
    </script>
</body>
</html>
