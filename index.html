<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700,800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-escuro: #050505;
            --verde-primario: #076f28;
            --verde-secundario: #05561f;
            --branco: #FFFFFF;
            --fonte-principal: 'General Sans', sans-serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }

        body { 
            font-family: var(--fonte-principal); 
            background: var(--bg-escuro); 
            color: var(--branco); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }
        
        #status-obs {
            padding: 10px 20px; border-radius: 50px; font-weight: 700; margin-bottom: 15px;
            font-size: 11px; text-transform: uppercase; background: #111; color: #555;
            border: 2px solid rgba(255,255,255,0.05); text-align: center;
            width: fit-content;
        }
        .status-on { background: #b71c1c !important; color: white !important; box-shadow: 0 0 20px #ff0000; animation: flash 1s infinite; border-color: #ff4d4d !important; }
        @keyframes flash { 50% { opacity: 0.6; } }

        .cronometro-container { width: 100%; max-width: 850px; display: flex; flex-direction: column; }

        #topo-relogio { 
            background: var(--verde-primario); 
            padding: 12px; 
            font-size: clamp(20px, 4vw, 32px); 
            font-weight: 800; 
            border-radius: 20px 20px 0 0; 
            text-align: center; 
        }

        #corpo-cronometro { 
            background: var(--verde-secundario); 
            padding: 30px 10px; 
            border-radius: 0 0 40px 40px; 
            border: 6px solid var(--verde-primario); 
            border-top: none; 
            display: flex; 
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Garante que o número não saia da caixa */
        }
        
        #tempo-display { 
            font-size: clamp(60px, 22vw, 240px); 
            font-weight: 800; 
            color: var(--branco); 
            line-height: 1; 
            font-variant-numeric: tabular-nums; 
            outline: none; 
            text-align: center;
            width: 100%;
            white-space: nowrap; /* IMPEDE QUEBRA DE LINHA */
            cursor: text;
        }
        
        .urgente { color: #ffeb3b !important; } 
        .excedido { color: #ff4d4d !important; }
        .tremendo { animation: shake 0.1s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(3px); } 75% { transform: translateX(-3px); } }

        #controles { 
            margin-top: 20px; 
            background: #121212; 
            padding: 15px; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            width: 100%;
            max-width: 850px;
            border: 1px solid #222;
        }
        
        .linha-controles { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; }

        input { 
            background: #000; border: 2px solid #333; color: #55E21F; 
            padding: 10px; width: 120px; text-align: center; 
            font-size: 20px; font-weight: 700; border-radius: 10px; font-family: var(--fonte-principal);
        }

        button { 
            padding: 12px 15px; border: none; border-radius: 8px; 
            font-weight: 700; cursor: pointer; text-transform: uppercase; 
            font-size: 10px; background: var(--verde-primario); 
            color: white; border-bottom: 3px solid #044419;
            flex: 1; min-width: 100px;
        }
        
        button:active { transform: translateY(1px); border-bottom: none; }
        .btn-pausar { background: #e67e22 !important; border-bottom-color: #a05819 !important; }
        .btn-danger { background: #8b0000 !important; border-bottom-color: #4b0000 !important; }
        .btn-obs { background: #333; border-bottom-color: #111; }

        @media (max-width: 480px) {
            button { min-width: 44%; font-size: 9px; }
            #corpo-cronometro { padding: 20px 5px; }
        }
    </style>
</head>
<body>

    <div id="status-obs">Sistema Offline</div>

    <div class="cronometro-container">
        <div id="topo-relogio">00:00:00</div>
        <div id="corpo-cronometro">
            <div id="tempo-display" contenteditable="true" spellcheck="false">02:00</div>
        </div>
    </div>
    
    <div id="controles">
        <div class="linha-controles">
            <input type="text" id="in-t" placeholder="0000" inputmode="numeric">
            <button onclick="setPre('0200')">2 Min</button>
            <button onclick="setPre('0500')">5 Min</button>
            <button onclick="setPre('1500')">15 Min</button>
        </div>

        <div class="linha-controles">
            <button id="btn-main" onclick="acaoPrincipal()">Iniciar</button>
            <button class="btn-danger" onclick="pararTudo()">Desativar</button>
            <button onclick="resetarTotal()">Resetar</button>
            <button class="btn-obs" onclick="toggleOBS(true)">Mostrar OBS</button>
            <button class="btn-obs" onclick="toggleOBS(false)">Ocultar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANkLt3rRd16ueIAKbfFhCXfcutMEky_c8",
            authDomain: "cronometro-82294.firebaseapp.com",
            projectId: "cronometro-82294",
            databaseURL: "https://cronometro-82294-default-rtdb.firebaseio.com",
            appId: "1:716345460408:web:27a5699b42d17f4b58d64d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const disp = document.getElementById('tempo-display');
        const inputTempo = document.getElementById('in-t');
        const btnMain = document.getElementById('btn-main');

        let ticker = null;
        let totalSegundos = 120; // Começa sempre com 2 minutos (120s)
        let rodando = false;
        let visivel = false;
        let tempoOriginalSegundos = 120;

        // --- ÁUDIO UNIVERSAL BIP BIP ---
        let audioCtx = null;
        let bipInterval = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function tocarBip() {
            if (bipInterval) return;
            initAudio();
            bipInterval = setInterval(() => {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(3000, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(1.0, now + 0.01);
                gain.gain.setValueAtTime(1.0, now + 0.1);
                gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.15);
            }, 300);
        }

        function pararBip() { if (bipInterval) { clearInterval(bipInterval); bipInterval = null; } }

        // --- LÓGICA DE FORMATAÇÃO ---
        function processarEntradaMicroondas(texto) {
            let numeros = texto.replace(/\D/g, '');
            if (!numeros) return 0;
            // Pega o valor total e divide: últimos 2 dígitos são segundos, o resto são minutos
            let val = parseInt(numeros);
            let s = val % 100;
            let m = Math.floor(val / 100);
            return (m * 60) + s;
        }

        function atualizarInterface() {
            const sinal = totalSegundos < 0 ? '-' : '';
            const abs = Math.abs(totalSegundos);
            const m = Math.floor(abs / 60);
            const s = abs % 60;
            
            // Garante o formato 00:00 mesmo para números grandes
            const texto = `${sinal}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            disp.innerText = texto;
            
            // Estilos Visuais
            if (totalSegundos < 0) {
                disp.className = 'excedido';
                if (totalSegundos >= -10) { disp.classList.add('tremendo'); tocarBip(); }
                else { disp.classList.remove('tremendo'); pararBip(); }
            } else if (totalSegundos <= 30) {
                disp.className = 'urgente';
                pararBip();
            } else {
                disp.className = '';
                pararBip();
            }
        }

        function sincronizar() {
            localStorage.setItem('cronometro_master_save', JSON.stringify({
                totalSegundos, tempoOriginalSegundos, rodando, visivel, ts: Date.now()
            }));
            set(ref(db, 'sessao'), { t: disp.innerText, c: disp.className, v: visivel });
        }

        // --- AÇÕES ---
        window.acaoPrincipal = () => {
            initAudio();
            if (rodando) {
                clearInterval(ticker); rodando = false;
                btnMain.innerText = "Iniciar"; btnMain.classList.remove('btn-pausar');
                pararBip();
            } else {
                rodando = true; btnMain.innerText = "Pausar"; btnMain.classList.add('btn-pausar');
                ticker = setInterval(() => { totalSegundos--; atualizarInterface(); sincronizar(); }, 1000);
            }
            sincronizar();
        };

        window.resetarTotal = () => {
            initAudio();
            clearInterval(ticker); rodando = false;
            totalSegundos = tempoOriginalSegundos;
            btnMain.innerText = "Iniciar"; btnMain.classList.remove('btn-pausar');
            pararBip(); atualizarInterface(); sincronizar();
        };

        window.setPre = (val) => {
            initAudio();
            tempoOriginalSegundos = processarEntradaMicroondas(val);
            totalSegundos = tempoOriginalSegundos;
            atualizarInterface(); sincronizar();
        };

        window.toggleOBS = (v) => {
            initAudio();
            visivel = v;
            const st = document.getElementById('status-obs');
            st.innerText = v ? "OBS: AO VIVO 🟢" : "OBS: OCULTO 🔴";
            v ? st.classList.add('status-on') : st.classList.remove('status-on');
            sincronizar();
        };

        window.pararTudo = () => { window.resetarTotal(); window.toggleOBS(false); };

        // Eventos de entrada
        disp.onblur = () => { 
            totalSegundos = processarEntradaMicroondas(disp.innerText); 
            tempoOriginalSegundos = totalSegundos;
            atualizarInterface(); sincronizar(); 
        };
        inputTempo.onblur = () => { 
            totalSegundos = processarEntradaMicroondas(inputTempo.value); 
            tempoOriginalSegundos = totalSegundos;
            atualizarInterface(); sincronizar(); 
        };
        disp.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); disp.blur(); } };

        // Relógio de Parede
        setInterval(() => {
            document.getElementById('topo-relogio').innerText = new Date().toLocaleTimeString('pt-PT');
        }, 1000);

        // --- PERSISTÊNCIA ---
        const saved = localStorage.getItem('cronometro_master_save');
        if (saved) {
            const data = JSON.parse(saved);
            totalSegundos = data.totalSegundos;
            tempoOriginalSegundos = data.tempoOriginalSegundos;
            visivel = data.visivel || false;
            if (data.rodando) {
                totalSegundos -= Math.floor((Date.now() - data.ts) / 1000);
                window.acaoPrincipal();
            }
            window.toggleOBS(visivel);
        } else {
            // Se não houver nada salvo, começa com 2 min
            totalSegundos = 120;
            tempoOriginalSegundos = 120;
        }

        atualizarInterface();
    </script>
</body>
</html>
